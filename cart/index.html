<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - AnajakCode</title>
    <link rel="stylesheet" href="../theme/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-top">
                <div class="logo">
                    <a href="/">AnajakCode</a>
                </div>
                <div class="header-actions">
                    <a href="/" class="btn btn-outline btn-sm"><i class="fas fa-arrow-left"></i> Continue Shopping</a>
                </div>
            </div>
        </div>
    </header>

    <section class="cart-page">
        <div class="container">
            <h1><i class="fas fa-shopping-bag" style="color: var(--primary); margin-right: 12px;"></i>Shopping Cart</h1>
            
            <div id="cart-content" class="cart-content">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading your cart...</p>
                </div>
            </div>
        </div>
    </section>

    <script src="../api.js"></script>
    <script src="../function/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadCartPage();
            updateCartCount();
        });
    </script>
</body>
</html>
