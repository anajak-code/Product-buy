<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="stylesheet" href="./theme/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-top">
                <div class="logo">
                    <a href="index.html">⚡ ShopName</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Checkout Form -->
    <section class="checkout-page">
        <div class="container">
            <h1>Checkout</h1>
            
            <div class="checkout-grid">
                <div class="checkout-form">
                    <h2>Customer Information</h2>
                    <form id="checkout-form" onsubmit="placeOrder(event)">
                        <div class="form-group">
                            <label>Full Name *</label>
                            <input type="text" id="customer-name" required placeholder="John Doe">
                        </div>
                        
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" id="customer-email" required placeholder="john@example.com">
                        </div>
                        
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" id="customer-phone" placeholder="+855 12 345 678">
                        </div>
                        
                        <div class="form-group">
                            <label>Address</label>
                            <textarea id="customer-address" rows="3" placeholder="Your delivery address"></textarea>
                        </div>

                        <div class="order-summary">
                            <h2>Order Summary</h2>
                            <div id="checkout-items"></div>
                            <div class="checkout-total">
                                <span>Total:</span>
                                <span id="checkout-total">$0.00</span>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block btn-lg">
                            <i class="fas fa-check"></i> Place Order
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script src="./api.js"></script>
    <script src="./function/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadCheckoutItems();
        });
    </script>
</body>
</html>
