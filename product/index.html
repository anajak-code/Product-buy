<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - AnajakCode</title>
    <link rel="stylesheet" href="../theme/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-top">
                <div class="logo">
                    <a href="/">AnajakCode</a>
                </div>
                <div class="header-actions">
                    <a href="/" class="btn btn-outline btn-sm"><i class="fas fa-arrow-left"></i> Back</a>
                    <a href="cart" class="cart-icon">
                        <i class="fas fa-shopping-bag"></i>
                        <span class="cart-count" id="cart-count">0</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <section class="product-details">
        <div class="container">
            <div id="product-content" class="product-content">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading product details...</p>
                </div>
            </div>
        </div>
    </section>

    <section class="products-section" style="background: white; border-top: 1px solid var(--border);">
        <div class="container">
            <div class="section-header">
                <h2>Related Products</h2>
            </div>
            <div id="related-products-grid" class="products-grid"></div>
        </div>
    </section>

    <script src="../api.js"></script>
    <script src="../function/script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            if (productId) {
                loadProductDetails(productId);
            }
            updateCartCount();
        });
    </script>
</body>
</html>
